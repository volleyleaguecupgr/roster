<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volley League 2025-26</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: top left;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Match card ───────────────────────────────────────── */
        .match-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin-top: -40px;
        }

        /* ── Individual team column ───────────────────────────── */
        .team-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            width: 380px;
        }

        /* The frosted-glass card that holds the logo */
        .team-logo-card {
            width: 380px;
            height: 360px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
        }

        .team-logo-card img {
            max-width: 300px;
            max-height: 290px;
            object-fit: contain;
        }

        /* Team name below the card */
        .team-name {
            font-size: 1.45em;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            color: #ffffff;
            line-height: 1.3;
            letter-spacing: 0.03em;
        }

        /* ── Centre info column ───────────────────────────────── */
        .match-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 220px;
        }

        .date {
            font-size: 3.2em;
            font-weight: 900;
            color: #5eb3e4;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .vs {
            font-size: 7em;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            margin: 6px 0;
        }

        .time {
            font-size: 3.2em;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-top: 10px;
        }

        .court {
            font-size: 1.1em;
            font-weight: 600;
            text-align: center;
            color: #5eb3e4;
            margin-top: 14px;
            letter-spacing: 0.04em;
        }

        /* ── Error / loading states ───────────────────────────── */
        .no-match,
        .loading {
            text-align: center;
            color: #fff;
            font-size: 2em;
            font-weight: 600;
            padding: 60px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        /* ── Scale to viewport ────────────────────────────────── */
        @media (max-width: 1920px) {
            body {
                transform: scale(calc(min(100vw / 1920px, 100vh / 1080px)));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="match-display"></div>
    </div>

    <script>
        const GITHUB_USERNAME = 'volleyleaguecupgr';
        const REPO_NAME = 'roster';
        const JSON_PATH = 'schedule/gameday/schedule.json';

        const teamMapping = {
            "paok":          "ΠΑΟΚ",
            "foinikas":      "ΑΟ ΦΟΙΝΙΚΑΣ ΣΥΡΟΥ",
            "panathinaikos": "ΠΑΝΑΘΗΝΑΪΚΟΣ AO",
            "floisvos":      "ΑΟ ΦΛΟΙΣΒΟΣ MEMBERS PARON",
            "milon":         "ΑΟΝΣ ΜΙΛΩΝ",
            "kalamata":      "ΑΟ ΚΑΛΑΜΑΤΑ '80 AFFIDEA",
            "panionios":     "ΠΑΝΙΩΝΙΟΣ",
            "olympiakos":    "ΟΛΥΜΠΙΑΚΟΣ ΣΦΠ OΝΕΧ",
            "ofi":           "ΟΦΗ",
            "kifisia":       "ΑΟΠ ΚΗΦΙΣΙΑΣ"
        };

        async function loadScheduleData() {
            try {
                const url = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/${JSON_PATH}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Error loading schedule data:', error);
                return null;
            }
        }

        function getTeamFromURL() {
            const team = new URLSearchParams(window.location.search).get('team');
            return team ? team.toLowerCase() : null;
        }

        function findTeamMatch(scheduleData, teamKey) {
            if (!scheduleData || !teamKey) return null;
            const teamName = teamMapping[teamKey];
            if (!teamName) return null;
            return scheduleData.matches.find(m =>
                m.home.name === teamName || m.away.name === teamName
            );
        }

        function displayMatch(match) {
            const container = document.getElementById('match-display');

            if (!match) {
                container.innerHTML = '<div class="no-match">Δεν βρέθηκε αγώνας για αυτήν την ομάδα</div>';
                return;
            }

            container.innerHTML = `
                <div class="match-card">

                    <!-- Home team -->
                    <div class="team-container">
                        <div class="team-logo-card">
                            <img src="${match.home.logo}" alt="${match.home.name}"
                                 onerror="this.src='logos/default.png'">
                        </div>
                        <div class="team-name">${match.home.name}</div>
                    </div>

                    <!-- Centre: date / VS / time / court -->
                    <div class="match-info">
                        <div class="date">${match.date}</div>
                        <div class="vs">VS</div>
                        <div class="time">${match.time}</div>
                        <div class="court">${match.court}</div>
                    </div>

                    <!-- Away team -->
                    <div class="team-container">
                        <div class="team-logo-card">
                            <img src="${match.away.logo}" alt="${match.away.name}"
                                 onerror="this.src='logos/default.png'">
                        </div>
                        <div class="team-name">${match.away.name}</div>
                    </div>

                </div>
            `;
        }

        async function init() {
            const container = document.getElementById('match-display');
            const teamKey = getTeamFromURL();

            if (!teamKey) {
                container.innerHTML = '<div class="no-match">Παρακαλώ προσθέστε ?team=team_name στο URL</div>';
                return;
            }

            const scheduleData = await loadScheduleData();
            if (!scheduleData) {
                container.innerHTML = '<div class="no-match">Σφάλμα φόρτωσης δεδομένων. Ελέγξτε τη σύνδεση.</div>';
                return;
            }

            displayMatch(findTeamMatch(scheduleData, teamKey));
        }

        init();
    </script>
</body>
</html>
