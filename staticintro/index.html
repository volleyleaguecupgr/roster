<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volley League 2025-26</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: top left;
        }

        @media screen {
            body {
                transform: scale(calc(min(100vw / 1920px, 100vh / 1080px)));
            }
        }

        .container {
            width: 1920px;
            height: 1080px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Match card ── */
        .match-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin-top: -60px; /* nudge up into the background card zone */
        }

        /* ── Team column — invisible, just for sizing/alignment ── */
        .team-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 380px;
        }

        /* Transparent placeholder — same size as background cards */
        .team-logo-slot {
            width: 380px;
            height: 340px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .team-logo-slot img {
            max-width: 300px;
            max-height: 290px;
            object-fit: contain;
        }

        .team-name {
            font-size: 1.45em;
            font-weight: 800;
            text-transform: uppercase;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.03em;
            line-height: 1.3;
        }

        /* ── Centre info ── */
        .match-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 220px;
        }

        .date {
            font-size: 3em;
            font-weight: 900;
            color: #5eb3e4;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .vs {
            font-size: 7em;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            margin: 4px 0;
        }

        .time {
            font-size: 3em;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-top: 6px;
        }

        .court {
            font-size: 1.05em;
            font-weight: 600;
            text-align: center;
            color: #5eb3e4;
            margin-top: 12px;
            letter-spacing: 0.04em;
        }

        /* ── Error / loading ── */
        .no-match, .loading {
            text-align: center;
            color: #fff;
            font-size: 2em;
            font-weight: 600;
            padding: 60px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="match-display"></div>
    </div>

    <script>
        const GITHUB_USERNAME = 'volleyleaguecupgr';
        const REPO_NAME       = 'roster';
        const JSON_PATH       = 'schedule/gameday/schedule.json';

        const teamMapping = {
            "paok":          "ΠΑΟΚ",
            "foinikas":      "ΑΟ ΦΟΙΝΙΚΑΣ ΣΥΡΟΥ",
            "panathinaikos": "ΠΑΝΑΘΗΝΑΪΚΟΣ AO",
            "floisvos":      "ΑΟ ΦΛΟΙΣΒΟΣ MEMBERS PARON",
            "milon":         "ΑΟΝΣ ΜΙΛΩΝ",
            "kalamata":      "ΑΟ ΚΑΛΑΜΑΤΑ '80 AFFIDEA",
            "panionios":     "ΠΑΝΙΩΝΙΟΣ",
            "olympiakos":    "ΟΛΥΜΠΙΑΚΟΣ ΣΦΠ OΝΕΧ",
            "ofi":           "ΟΦΗ",
            "kifisia":       "ΑΟΠ ΚΗΦΙΣΙΑΣ"
        };

        async function loadScheduleData() {
            try {
                const url = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/${JSON_PATH}`;
                const r = await fetch(url);
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return await r.json();
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        function getTeamFromURL() {
            const t = new URLSearchParams(window.location.search).get('team');
            return t ? t.toLowerCase() : null;
        }

        function findTeamMatch(data, key) {
            if (!data || !key) return null;
            const name = teamMapping[key];
            if (!name) return null;
            return data.matches.find(m => m.home.name === name || m.away.name === name);
        }

        function displayMatch(match) {
            const el = document.getElementById('match-display');
            if (!match) {
                el.innerHTML = '<div class="no-match">Δεν βρέθηκε αγώνας για αυτήν την ομάδα</div>';
                return;
            }

            el.innerHTML = `
                <div class="match-card">

                    <div class="team-container">
                        <div class="team-logo-slot">
                            <img src="${match.home.logo}" alt="${match.home.name}"
                                 onerror="this.src='logos/default.png'">
                        </div>
                        <div class="team-name">${match.home.name}</div>
                    </div>

                    <div class="match-info">
                        <div class="date">${match.date}</div>
                        <div class="vs">VS</div>
                        <div class="time">${match.time}</div>
                        <div class="court">${match.court}</div>
                    </div>

                    <div class="team-container">
                        <div class="team-logo-slot">
                            <img src="${match.away.logo}" alt="${match.away.name}"
                                 onerror="this.src='logos/default.png'">
                        </div>
                        <div class="team-name">${match.away.name}</div>
                    </div>

                </div>
            `;
        }

        async function init() {
            const el      = document.getElementById('match-display');
            const teamKey = getTeamFromURL();

            if (!teamKey) {
                el.innerHTML = '<div class="no-match">Παρακαλώ προσθέστε ?team=team_name στο URL</div>';
                return;
            }

            const data = await loadScheduleData();
            if (!data) {
                el.innerHTML = '<div class="no-match">Σφάλμα φόρτωσης δεδομένων.</div>';
                return;
            }

            displayMatch(findTeamMatch(data, teamKey));
        }

        init();
    </script>
</body>
</html>
