<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volley League 2025-26</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('background.png');
            background-size: 1920px 1080px;
            background-position: top left;
            background-repeat: no-repeat;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            transform-origin: top left;
        }

        @media screen {
            body {
                transform: scale(calc(min(100vw / 1920px, 100vh / 1080px)));
            }
        }

        /* ─── All children are absolutely placed over the bg ─── */
        .container {
            position: relative;
            width: 1920px;
            height: 1080px;
        }

        /* ── LEFT logo box
             Background left card spans roughly x:220→600, y:185→545
             Centre: x=410, y=365  →  left = 410 - w/2, top = 365 - h/2  */
        .home-logo {
            position: absolute;
            left: 245px;           /* centre of left card */
            top:  205px;
            width: 560px;
            height: 540px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── RIGHT logo box
             Background right card spans roughly x:880→1255, y:185→545
             Centre: x=1067, y=365 */
        .away-logo {
            position: absolute;
            left: 1132px;           /* centre of right card */
            top:  205px;
            width: 560px;
            height: 540px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-logo img,
        .away-logo  img {
            max-width:  500px;
            max-height: 410px;
            object-fit: contain;
        }

        /* ── Team names — below the cards in the background ── */
        .home-name {
            position: absolute;
            left:  370px;
            top:   755px;          /* just below the card bottom (~545px) */
            width: 360px;
            text-align: center;
            font-size: 1.85em;
            font-weight: 800;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 0.03em;
            line-height: 1.3;
        }

        .away-name {
            position: absolute;
            left:  1237px;
            top:   755px;
            width: 360px;
            text-align: center;
            font-size: 1.85em;
            font-weight: 800;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 0.03em;
            line-height: 1.3;
        }

        /* ── Date — above the VS text in the background ──
             VS in background is centred around x≈737, y≈365
             Put date above it, time+court below it            */
        .date {
            position: absolute;
            left:  838px;          /* gap between cards: x:600→880, mid=740 */
            width: 280px;
            top:   385px;          /* above the VS */
            text-align: center;
            font-size: 3.8em;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.02em;
            line-height: 1;
        }

        /* ── Time — below the VS text in the background ── */
        .time {
            position: absolute;
            left:  838px;
            width: 280px;
            top:   575px;          /* below the VS */
            text-align: center;
            font-size: 3.8em;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.02em;
            line-height: 1;
        }

        /* ── Court — just below the time ── */
        .court {
            position: absolute;
            left:  838px;
            width: 280px;
            top:   680px;
            text-align: center;
            font-size: 1em;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.04em;
        }

        /* ── Error / loading ── */
        .no-match, .loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            font-size: 2em;
            font-weight: 600;
            padding: 60px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="container" id="match-display"></div>

    <script>
        const GITHUB_USERNAME = 'volleyleaguecupgr';
        const REPO_NAME       = 'roster';
        const JSON_PATH       = 'schedule/gameday/schedule.json';

        const teamMapping = {
            "paok":          "ΠΑΟΚ",
            "foinikas":      "ΑΟ ΦΟΙΝΙΚΑΣ ΣΥΡΟΥ",
            "panathinaikos": "ΠΑΝΑΘΗΝΑΪΚΟΣ AO",
            "floisvos":      "ΑΟ ΦΛΟΙΣΒΟΣ MEMBERS PARON",
            "milon":         "ΑΟΝΣ ΜΙΛΩΝ",
            "kalamata":      "ΑΟ ΚΑΛΑΜΑΤΑ '80 AFFIDEA",
            "panionios":     "ΠΑΝΙΩΝΙΟΣ",
            "olympiakos":    "ΟΛΥΜΠΙΑΚΟΣ ΣΦΠ OΝΕΧ",
            "ofi":           "ΟΦΗ",
            "kifisia":       "ΑΟΠ ΚΗΦΙΣΙΑΣ"
        };

        async function loadScheduleData() {
            try {
                const url = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/${JSON_PATH}`;
                const r = await fetch(url);
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return await r.json();
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        function getTeamFromURL() {
            const t = new URLSearchParams(window.location.search).get('team');
            return t ? t.toLowerCase() : null;
        }

        function findTeamMatch(data, key) {
            if (!data || !key) return null;
            const name = teamMapping[key];
            if (!name) return null;
            return data.matches.find(m => m.home.name === name || m.away.name === name);
        }

        function displayMatch(match) {
            const el = document.getElementById('match-display');
            if (!match) {
                el.innerHTML = '<div class="no-match">Δεν βρέθηκε αγώνας για αυτήν την ομάδα</div>';
                return;
            }

            el.innerHTML = `
                <div class="home-logo">
                    <img src="${match.home.logo}" alt="${match.home.name}"
                         onerror="this.src='logos/default.png'">
                </div>

                <div class="away-logo">
                    <img src="${match.away.logo}" alt="${match.away.name}"
                         onerror="this.src='logos/default.png'">
                </div>

                <div class="home-name">${match.home.name}</div>
                <div class="away-name">${match.away.name}</div>

                <div class="date">${match.date}</div>
                <div class="time">${match.time}</div>
                <div class="court">${match.court}</div>
            `;
        }

        async function init() {
            const el      = document.getElementById('match-display');
            const teamKey = getTeamFromURL();

            if (!teamKey) {
                el.innerHTML = '<div class="no-match">Παρακαλώ προσθέστε ?team=team_name στο URL</div>';
                return;
            }

            const data = await loadScheduleData();
            if (!data) {
                el.innerHTML = '<div class="no-match">Σφάλμα φόρτωσης δεδομένων.</div>';
                return;
            }

            displayMatch(findTeamMatch(data, teamKey));
        }

        init();
    </script>
</body>
</html>
