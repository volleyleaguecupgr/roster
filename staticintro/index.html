<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volley League 2025-26</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('background.png');
            background-size: 1920px 1080px;
            background-position: top left;
            background-repeat: no-repeat;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            transform-origin: top left;
        }

        /* Scale body to fit any screen */
        @media screen {
            body {
                transform: scale(calc(min(100vw / 1920px, 100vh / 1080px)));
            }
        }

        .container {
            position: relative;
            width: 1920px;
            height: 1080px;
        }

        /* ── Home logo — centred on left card in background ── */
        .home-logo {
            position: absolute;
            /* Left card in background: roughly x 220–595, y 185–545 */
            left: 220px;
            top:  185px;
            width:  375px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Away logo — centred on right card in background ── */
        .away-logo {
            position: absolute;
            /* Right card in background: roughly x 880–1255, y 185–545 */
            left: 880px;
            top:  185px;
            width:  375px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-logo img,
        .away-logo  img {
            max-width:  300px;
            max-height: 290px;
            object-fit: contain;
        }

        /* ── Team names below the cards ── */
        .home-name,
        .away-name {
            position: absolute;
            top: 555px;   /* just below cards */
            font-size: 1.5em;
            font-weight: 800;
            text-transform: uppercase;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.03em;
            line-height: 1.3;
        }

        .home-name {
            left:  220px;
            width: 375px;
        }

        .away-name {
            left:  880px;
            width: 375px;
        }

        /* ── Centre info: date / VS / time / court ── */
        .match-info {
            position: absolute;
            /* Horizontally centred between the two cards (~595 to ~880, mid = ~737) */
            left: 595px;
            width: 285px;
            top: 230px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .date {
            font-size: 2.8em;
            font-weight: 900;
            color: #5eb3e4;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .vs {
            font-size: 6.5em;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            margin: 4px 0;
        }

        .time {
            font-size: 2.8em;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-top: 4px;
        }

        .court {
            font-size: 1em;
            font-weight: 600;
            text-align: center;
            color: #5eb3e4;
            margin-top: 10px;
            letter-spacing: 0.04em;
        }

        /* ── Error / loading ── */
        .no-match, .loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            font-size: 2em;
            font-weight: 600;
            padding: 60px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="match-display"></div>
    </div>

    <script>
        const GITHUB_USERNAME = 'volleyleaguecupgr';
        const REPO_NAME       = 'roster';
        const JSON_PATH       = 'schedule/gameday/schedule.json';

        const teamMapping = {
            "paok":          "ΠΑΟΚ",
            "foinikas":      "ΑΟ ΦΟΙΝΙΚΑΣ ΣΥΡΟΥ",
            "panathinaikos": "ΠΑΝΑΘΗΝΑΪΚΟΣ AO",
            "floisvos":      "ΑΟ ΦΛΟΙΣΒΟΣ MEMBERS PARON",
            "milon":         "ΑΟΝΣ ΜΙΛΩΝ",
            "kalamata":      "ΑΟ ΚΑΛΑΜΑΤΑ '80 AFFIDEA",
            "panionios":     "ΠΑΝΙΩΝΙΟΣ",
            "olympiakos":    "ΟΛΥΜΠΙΑΚΟΣ ΣΦΠ OΝΕΧ",
            "ofi":           "ΟΦΗ",
            "kifisia":       "ΑΟΠ ΚΗΦΙΣΙΑΣ"
        };

        async function loadScheduleData() {
            try {
                const url = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/${JSON_PATH}`;
                const r = await fetch(url);
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return await r.json();
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        function getTeamFromURL() {
            const t = new URLSearchParams(window.location.search).get('team');
            return t ? t.toLowerCase() : null;
        }

        function findTeamMatch(data, key) {
            if (!data || !key) return null;
            const name = teamMapping[key];
            if (!name) return null;
            return data.matches.find(m => m.home.name === name || m.away.name === name);
        }

        function displayMatch(match) {
            const el = document.getElementById('match-display');
            if (!match) {
                el.innerHTML = '<div class="no-match">Δεν βρέθηκε αγώνας για αυτήν την ομάδα</div>';
                return;
            }

            el.innerHTML = `
                <!-- Home logo -->
                <div class="home-logo">
                    <img src="${match.home.logo}" alt="${match.home.name}"
                         onerror="this.src='logos/default.png'">
                </div>

                <!-- Away logo -->
                <div class="away-logo">
                    <img src="${match.away.logo}" alt="${match.away.name}"
                         onerror="this.src='logos/default.png'">
                </div>

                <!-- Team names -->
                <div class="home-name">${match.home.name}</div>
                <div class="away-name">${match.away.name}</div>

                <!-- Centre info -->
                <div class="match-info">
                    <div class="date">${match.date}</div>
                    <div class="vs">VS</div>
                    <div class="time">${match.time}</div>
                    <div class="court">${match.court}</div>
                </div>
            `;
        }

        async function init() {
            const el      = document.getElementById('match-display');
            const teamKey = getTeamFromURL();

            if (!teamKey) {
                el.innerHTML = '<div class="no-match">Παρακαλώ προσθέστε ?team=team_name στο URL</div>';
                return;
            }

            const data = await loadScheduleData();
            if (!data) {
                el.innerHTML = '<div class="no-match">Σφάλμα φόρτωσης δεδομένων.</div>';
                return;
            }

            displayMatch(findTeamMatch(data, teamKey));
        }

        init();
    </script>
</body>
</html>
