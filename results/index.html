<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Αποτελέσματα - Results</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:transparent; min-height:100vh; overflow:hidden; }

        .graphics-container {
            position:fixed; top:0; left:0; width:1920px; height:1080px;
            display:flex; justify-content:center; align-items:center;
            transform-origin:top left;
            transform:scale(calc(min(100vw / 1920, 100vh / 1080)));
            background:transparent;
        }

        .volleyball-3d-scene { position:absolute; top:0; left:0; width:1920px; height:1080px; z-index:3; pointer-events:none; }

        /* ── MOVING LINES ─── */
        .moving-lines { position:absolute; top:0; left:0; width:1920px; height:1080px; overflow:hidden; z-index:2; pointer-events:none; }
        .line { position:absolute; height:3px; background:linear-gradient(90deg, transparent 0%, rgba(59,130,246,0.4) 20%, rgba(147,197,253,0.6) 50%, rgba(59,130,246,0.4) 80%, transparent 100%); border-radius:2px; box-shadow:0 0 15px rgba(59,130,246,0.3); }
        .line-1 { width:400px; top:15%; animation:moveLine1 12s linear infinite; }
        .line-2 { width:350px; top:35%; animation:moveLine2 10s linear infinite; }
        .line-3 { width:500px; top:55%; animation:moveLine3 14s linear infinite; }
        .line-4 { width:300px; top:75%; animation:moveLine4 11s linear infinite; }
        .line-5 { width:450px; top:25%; animation:moveLine5 9s  linear infinite; }
        @keyframes moveLine1 {0%{left:-400px;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{left:1920px;opacity:0;}}
        @keyframes moveLine2 {0%{right:-350px;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{right:1920px;opacity:0;}}
        @keyframes moveLine3 {0%{left:-500px;opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{left:1920px;opacity:0;}}
        @keyframes moveLine4 {0%{right:-300px;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{right:1920px;opacity:0;}}
        @keyframes moveLine5 {0%{right:-450px;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{right:1920px;opacity:0;}}

        /* ── TITLE ─── */
        .title {
            position:absolute; top:55px; left:50%; transform:translateX(-50%);
            font-size:48px; font-weight:900; letter-spacing:3px; white-space:nowrap;
            background: linear-gradient(135deg, #22d3ee 0%, #67e8f9 50%, #06b6d4 100%);
            background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            z-index:15; opacity:0;
            filter: drop-shadow(0 0 20px rgba(34,211,238,0.5));
            animation:titleSlideIn 2s ease-out 0.5s forwards;
        }
        @keyframes titleSlideIn {
            0%   { opacity:0; transform:translateX(-50%) translateY(-30px); }
            100% { opacity:1; transform:translateX(-50%) translateY(0); }
        }

        /* ── SCHEDULE CONTAINER ─── */
        .schedule-container {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:1500px; z-index:10; opacity:0;
            animation:containerSlideIn 1s ease-out 0.8s forwards;
        }
        @keyframes containerSlideIn {
            0%   { opacity:0; transform:translate(-50%,-50%) translateY(50px); }
            100% { opacity:1; transform:translate(-50%,-50%) translateY(0); }
        }

        .schedule-table { width:100%; background:transparent; overflow:visible; border:none; }

        /* ── GAME ROW ─── */
        .game-row {
            position:relative; overflow:hidden;
            display:grid;
            /* home-logo | home-name | score-area | away-name | away-logo */
            grid-template-columns: 120px 1fr 420px 1fr 120px;
            align-items:center; gap:0; padding:14px 30px;
            background: url('Layer_1.png') center center / cover no-repeat;
            opacity:0; transform:translateX(-150px) scale(0.95);
            border-radius:14px; margin:6px 0;
            animation:slideInScaleGlow 1.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes slideInScaleGlow {
            0%   { opacity:0; transform:translateX(-150px) scale(0.95); }
            70%  { box-shadow:0 0 30px rgba(59,130,246,0.4); }
            100% { opacity:1; transform:translateX(0) scale(1); box-shadow:0 4px 20px rgba(0,0,0,0.5); }
        }

        /* ── TEAM LOGO ─── */
        .team-logo img {
            width:85px; height:85px; object-fit:contain;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
        }
        .home-logo { display:flex; justify-content:flex-start; }
        .away-logo { display:flex; justify-content:flex-end; }

        /* ── TEAM NAME ─── */
        .home-name, .away-name {
            color:#f0f6ff; font-weight:800; font-size:22px;
            line-height:1.25; text-shadow:0 1px 4px rgba(0,0,0,0.7);
            letter-spacing:0.3px;
        }
        .home-name { text-align:left;  padding-left:20px; }
        .away-name { text-align:right; padding-right:20px; }

        /* ── SCORE CENTER AREA ─── */
        .score-center {
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            gap:10px;
        }

        /* Main score badge — uses Vector.png as background */
        .score-badge {
            position:relative;
            min-width:200px; height:62px;
            display:flex; align-items:center; justify-content:center;
        }
        .score-badge .score-text {
            font-size:38px; font-weight:900; color:#ffffff;
            letter-spacing:3px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        /* Set score badges row */
        .set-scores {
            display:flex; gap:10px; align-items:center;
        }
        .set-badge {
            position:relative;
            background: url('Vector.png') center center / 100% 100% no-repeat;
            min-width:130px; height:38px;
            display:flex; align-items:center; justify-content:center;
        }
        .set-badge .set-text {
            font-size:16px; font-weight:700; color:#e2eeff;
            letter-spacing:1px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            white-space:nowrap;
        }

        /* Empty set badge for pending sets */
        .set-badge.empty .set-text { opacity:0; }

        /* ── PLAYOFF BADGES ─── */
        .playoff-badge {
            position:absolute; left:-65px; width:55px;
            backdrop-filter:blur(10px);
            border-radius:15px; border:2px solid rgba(255,255,255,0.3);
            display:flex; align-items:center; justify-content:center;
            font-weight:700; font-size:18px; text-transform:uppercase;
            letter-spacing:0.5px; text-align:center; line-height:1.1;
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            z-index:5; writing-mode:vertical-rl; transform:rotate(180deg);
            pointer-events:none; color:#ffffff;
        }
        .playoff-badge.playoffs-14 { background:rgba(135,135,135,0.95); height:144px; top:0; }
        .playoff-badge.playoff-57  { background:rgba(135,135,135,0.95); height:144px; top:145px; }
        .playoff-badge.playout     { background:rgba(135,135,135,0.95); height:144px; top:145px; }

        /* ── LEAGUE LOGO ─── */
        .league-logo {
            position:absolute; bottom:20px; left:48%; transform:translateX(-50%);
            width:120px; height:120px; z-index:20;
            opacity:0;
            animation:logoZoomGlow 2s ease-out 4s forwards;
        }
        @keyframes logoZoomGlow {
            0%   { opacity:0; transform:translateX(-50%) scale(0.3); }
            50%  { opacity:1; transform:translateX(-50%) scale(1.1); filter:drop-shadow(0 0 30px #22d3ee); }
            100% { opacity:1; transform:translateX(-50%) scale(1);   filter:drop-shadow(0 0 20px #3b82f6); }
        }
        .league-logo img {
            width:150%; height:150%; object-fit:contain;
            animation:logoGlow 3s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0%,100% { filter:drop-shadow(0 0 20px rgba(59,130,246,0.6)) brightness(1); }
            50%     { filter:drop-shadow(0 0 30px rgba(34,211,238,0.8)) brightness(1.1); }
        }
    </style>
</head>
<body>
<div class="graphics-container" id="graphicsContainer">
    <div class="volleyball-3d-scene" id="volleyball-3d-scene"></div>

    <div class="moving-lines">
        <div class="line line-1"></div>
        <div class="line line-2"></div>
        <div class="line line-3"></div>
        <div class="line line-4"></div>
        <div class="line line-5"></div>
    </div>

    <div class="title" id="pageTitle">ΑΠΟΤΕΛΕΣΜΑΤΑ ΑΓΩΝΙΣΤΙΚΗΣ</div>

    <div class="schedule-container">
        <div class="playoff-badge playoffs-14">PLAYOFFS ΗΜΙΤΕΛΙΚΩΝ</div>
        <!-- <div class="playoff-badge playoff-57">PLAYOFF 5-7</div> -->
        <div class="playoff-badge playout">PLAYOUT</div>

        <div class="schedule-table" id="scheduleTable"></div>
    </div>

    <div class="league-logo">
        <img src="VL_logo.png" alt="Greek Volleyball League">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    /* ── DATA LOADER ─────────────────────────────────── */
    const SET_LABELS = ['1st', '2nd', '3rd', '4th', '5th'];

    const teams = {
        'ΑΟΝΣ ΜΙΛΩΝ':                  { logo: 'milon.png' },
        'ΑΟ ΚΑΛΑΜΑΤΑ 80 AFFIDEA':      { logo: 'kalamata.png' },
        'Ο.Φ.Η.':                      { logo: 'ofi.png' },
        'ΑΟΠ ΚΗΦΙΣΙΑΣ':               { logo: 'kifisia.png' },
        'Π.Α.Ο.Κ.':                    { logo: 'paok.png' },
        'ΑΟ ΦΟΙΝΙΚΑΣ ΣΥΡΟΥ':           { logo: 'foinikas.png' },
        'ΠΑΝΙΩΝΙΟΣ':                   { logo: 'panionios.png' },
        'ΟΛΥΜΠΙΑΚΟΣ ΣΦΠ ΟΝΕΧ':        { logo: 'olympiakos.png' },
        'ΠΑΝΑΘΗΝΑΪΚΟΣ AO':             { logo: 'panathinaikos.png' },
        'ΑΟ ΦΛΟΙΣΒΟΣ MEMBERS PARON':   { logo: 'floisvos.png' },
        'ΠΑΝΙΩΝΙΟΣ ΓΣΣ':              { logo: 'panionios.png' }
    };

    async function loadResults() {
        try {
            const res  = await fetch('./volleyball-results.json');
            const raw  = await res.json();

            // Support both array-of-rounds and single-round object
            const round = Array.isArray(raw) ? raw[0] : raw;

            // Update page title from data
            if (round.title) {
                document.getElementById('pageTitle').textContent = round.title;
            }

            const table = document.getElementById('scheduleTable');
            table.innerHTML = '';

            const games = round.games || round.matches || [];

            games.forEach((game, i) => {
                const row = document.createElement('div');
                row.className = 'game-row';
                row.style.animationDelay = `${1.5 + i * 0.3}s`;

                // Main score  e.g. "3-1"
                const mainScore = `${game.homeScore}-${game.awayScore}`;

                // Set badges — one per set played
                const sets = game.sets || [];
                const setHTML = sets.map((s, idx) =>
                    `<div class="set-badge">
                        <span class="set-text">${SET_LABELS[idx]} ${s.homePoints}-${s.awayPoints}</span>
                    </div>`
                ).join('');

                // Logo paths — derive from team name if not supplied
                const homeTeamData = teams[game.homeTeam] || {};
                const awayTeamData = teams[game.awayTeam] || {};
                const homeLogo = game.home?.logo || homeTeamData.logo || 'default.png';
                const awayLogo = game.away?.logo || awayTeamData.logo || 'default.png';

                row.innerHTML = `
                    <div class="home-logo team-logo">
                        <img src="${homeLogo}" alt="${game.homeTeam}"
                             onerror="this.style.display='none'">
                    </div>
                    <div class="home-name">${game.homeTeam}</div>

                    <div class="score-center">
                        <div class="score-badge">
                            <span class="score-text">${mainScore}</span>
                        </div>
                        <div class="set-scores">${setHTML}</div>
                    </div>

                    <div class="away-name">${game.awayTeam}</div>
                    <div class="away-logo team-logo">
                        <img src="${awayLogo}" alt="${game.awayTeam}"
                             onerror="this.style.display='none'">
                    </div>
                `;
                table.appendChild(row);
            });
        } catch (err) {
            console.error('Error loading results:', err);
        }
    }

    // Logo lookup handled via teams const above

    /* ── 3-D VOLLEYBALLS ─────────────────────────────── */
    let scene, camera, renderer, volleyballs = [], animationId;

    function init3D() {
        const container = document.getElementById('volleyball-3d-scene');
        scene    = new THREE.Scene();
        camera   = new THREE.PerspectiveCamera(75, 1920 / 1080, 0.1, 1000);
        camera.position.set(0, 0, 15);
        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(1920, 1080);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x404040, 0.6));
        const dir = new THREE.DirectionalLight(0xffffff, 0.8);
        dir.position.set(10, 10, 5); dir.castShadow = true;
        scene.add(dir);

        for (let i = 0; i < 3; i++) {
            const vb = createVolleyball();
            vb.userData = { speed: 0.8 + i * 0.3, yOffset: (i - 1) * 8, phase: i * Math.PI * 0.66, direction: i % 2 === 0 ? 1 : -1 };
            vb.position.set(vb.userData.direction === 1 ? -25 : 25, vb.userData.yOffset, -5 + i * 2);
            vb.scale.setScalar(0.8 + i * 0.1);
            volleyballs.push(vb); scene.add(vb);
        }
        animate3D();
    }

    function createVolleyball() {
        const geo = new THREE.SphereGeometry(2, 64, 64);
        const c   = document.createElement('canvas'); c.width = c.height = 1024;
        const ctx = c.getContext('2d'), cx = 512, cy = 512;
        ctx.fillStyle = '#1e3a8a'; ctx.fillRect(0, 0, 1024, 1024);
        ctx.fillStyle = '#fbbf24';
        [[- Math.PI/2, 0],[Math.PI/2, Math.PI],[Math.PI, 3*Math.PI/2]].forEach(([s,e]) => {
            ctx.beginPath(); ctx.arc(cx, cy, 400, s, e); ctx.lineTo(cx, cy); ctx.fill();
        });
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 8; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(cx, cy, 350, 0.3, Math.PI - 0.3); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, 350, Math.PI + 0.3, 2*Math.PI - 0.3); ctx.stroke();
        const mat = new THREE.MeshPhongMaterial({ map: new THREE.CanvasTexture(c), shininess: 25, specular: new THREE.Color(0x333333) });
        const mesh = new THREE.Mesh(geo, mat); mesh.castShadow = mesh.receiveShadow = true;
        return mesh;
    }

    function animate3D() {
        animationId = requestAnimationFrame(animate3D);
        const t = Date.now() * 0.001;
        volleyballs.forEach((vb, idx) => {
            const u = vb.userData;
            const p = (Math.sin((t * u.speed + u.phase) % (Math.PI * 2)) + 1) / 2;
            vb.position.x = u.direction === 1 ? -25 + p * 50 : 25 - p * 50;
            vb.position.y = u.yOffset + Math.sin(p * Math.PI) * 6;
            vb.rotation.x += 0.02 * u.speed;
            vb.rotation.y += 0.015 * u.speed;
            const s = 0.8 + idx * 0.1 + Math.sin(t * 2 + idx) * 0.1;
            vb.scale.setScalar(s);
        });
        renderer.render(scene, camera);
    }

    function onWindowResize() {
        const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        document.querySelector('.graphics-container').style.transform = `scale(${s})`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadResults();
        init3D();
        window.addEventListener('resize', onWindowResize);
    });
    window.addEventListener('beforeunload', () => {
        if (animationId) cancelAnimationFrame(animationId);
        if (renderer) renderer.dispose();
    });
</script>
</body>
</html>
