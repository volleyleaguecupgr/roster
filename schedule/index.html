<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Πρόγραμμα Αγώνων - Gameday Schedule</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:transparent; min-height:100vh; overflow:hidden; }

        .graphics-container { position:fixed; top:0; left:0; width:1920px; height:1080px;
            display:flex; justify-content:center; align-items:center;
            transform-origin:top left; transform:scale(calc(min(100vw / 1920px, 100vh / 1080px)));
            background:transparent; }

        .volleyball-3d-scene { position:absolute; top:0; left:0; width:1920px; height:1080px; z-index:3; pointer-events:none; }

        .moving-lines { position:absolute; top:0; left:0; width:1920px; height:1080px; overflow:hidden; z-index:2; pointer-events:none; }
        .line { position:absolute; height:3px; background:linear-gradient(90deg, transparent 0%, rgba(59,130,246,0.4) 20%, rgba(147,197,253,0.6) 50%, rgba(59,130,246,0.4) 80%, transparent 100%); border-radius:2px; box-shadow:0 0 15px rgba(59,130,246,0.3); }
        .line-1 { width:400px; top:15%; animation:moveLine1 12s linear infinite; }
        .line-2 { width:350px; top:35%; animation:moveLine2 10s linear infinite; }
        .line-3 { width:500px; top:55%; animation:moveLine3 14s linear infinite; }
        .line-4 { width:300px; top:75%; animation:moveLine4 11s linear infinite; }
        .line-5 { width:450px; top:25%; animation:moveLine5 9s linear infinite; }

        @keyframes moveLine1 {0%{left:-400px;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{left:1920px;opacity:0;}}
        @keyframes moveLine2 {0%{right:-350px;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{right:1920px;opacity:0;}}
        @keyframes moveLine3 {0%{left:-500px;opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{left:1920px;opacity:0;}}
        @keyframes moveLine4 {0%{right:-300px;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{right:1920px;opacity:0;}}
        @keyframes moveLine5 {0%{right:-450px;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{right:1920px;opacity:0;}}

        /* ── TITLE ─────────────────────────────────────── */
        .title {
            position:absolute; top:60px; left:50%; transform:translateX(-50%);
            font-size:48px; font-weight:900; letter-spacing:3px;
            background: linear-gradient(135deg, #22d3ee 0%, #67e8f9 50%, #06b6d4 100%);
            background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            z-index:15; opacity:0;
            animation:titleSlideIn 2s ease-out 0.5s forwards;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(34,211,238,0.5));
        }
        @keyframes titleSlideIn {
            0% { opacity:0; transform:translateX(-50%) translateY(-30px); }
            100% { opacity:1; transform:translateX(-50%) translateY(0); }
        }

        .schedule-container { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:1400px; z-index:10; opacity:0;
            animation:containerSlideIn 1s ease-out 0.8s forwards; }
        @keyframes containerSlideIn {
            0% { opacity:0; transform:translate(-50%,-50%) translateY(50px); }
            100% { opacity:1; transform:translate(-50%,-50%) translateY(0); }
        }

        /* ── TABLE WRAPPER ─────────────────────────────────────── */
        .schedule-table {
            width:100%;
            background: rgba(8, 16, 40, 0.92);
            border-radius:20px;
            overflow:hidden;
            border:2px solid rgba(59,130,246,0.35);
            box-shadow:
                0 25px 80px rgba(0,0,0,0.7),
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 0 60px rgba(59,130,246,0.08) inset;
        }

        /* ── GAME ROW ─────────────────────────────────────── */
        .game-row {
            position:relative; overflow:hidden;
            display:grid; grid-template-columns:280px 1fr 280px 150px;
            align-items:center; gap:20px; padding:18px 24px;
            border-bottom:1px solid rgba(59,130,246,0.15);
            background: linear-gradient(
                90deg,
                rgba(10, 20, 55, 0.97) 0%,
                rgba(15, 28, 65, 0.95) 40%,
                rgba(15, 28, 65, 0.95) 60%,
                rgba(10, 20, 55, 0.97) 100%
            );
            opacity:0; transform:translateX(-150px) scale(0.95);
            border-radius:10px; margin:4px 6px;
            box-shadow:0 0 0 rgba(59,130,246,0.5);
            animation:slideInScaleGlow 1.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
            transition: background 0.3s ease;
        }

        /* subtle left accent bar per row */
        .game-row::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, rgba(59,130,246,0.8) 0%, rgba(34,211,238,0.8) 100%);
            border-radius: 4px 0 0 4px;
        }

        .game-row:last-child { border-bottom: none; }

        @keyframes slideInScaleGlow {
            0% { opacity:0; transform:translateX(-150px) scale(0.95); box-shadow:0 0 0 rgba(59,130,246,0.5); }
            70% { box-shadow:0 0 30px rgba(59,130,246,0.5), 0 0 60px rgba(59,130,246,0.2); }
            100% { opacity:1; transform:translateX(0) scale(1); box-shadow:0 2px 12px rgba(0,0,0,0.4); }
        }

        /* ── TEAMS ─────────────────────────────────────── */
        .home-team, .away-team { display:flex; align-items:center; gap:20px; }
        .away-team { justify-content:flex-end; }

        .team-logo img {
            width:90px; height:90px; border-radius:50%; object-fit:contain;
            background:rgba(255,255,255,0.95);
            box-shadow:0 4px 16px rgba(0,0,0,0.5);
            border:2px solid rgba(255,255,255,0.7);
            padding:6px;
        }

        .team-info { color:#fff; }
        .home-team .team-info { text-align: left; }
        .away-team .team-info { text-align: right; }

        .team-name {
            font-weight:800; font-size:22px; margin-bottom:2px;
            color: #f0f6ff;
            text-shadow:0 1px 4px rgba(0,0,0,0.6);
            letter-spacing: 0.5px;
        }
        .team-subtitle {
            font-size:14px;
            color: rgba(148,190,255,0.85);
            font-weight: 500;
        }

        /* ── VS SECTION ─────────────────────────────────────── */
        .vs-section { display:flex; flex-direction:column; align-items:center; }

        .vs-text {
            font-size:36px; font-weight:900; letter-spacing:2px;
            color:#ffffff;
            text-shadow:
                0 0 20px rgba(59,130,246,0.9),
                0 0 40px rgba(59,130,246,0.5);
            margin-bottom:6px;
        }

        .game-date {
            font-size:22px; font-weight:600;
            color: rgba(200,220,255,0.9);
            margin-bottom:4px;
            letter-spacing: 1px;
        }

        .game-time {
            font-size:28px; font-weight:800;
            color:#ffffff;
            letter-spacing:1px;
        }

        /* ── COURT INFO ─────────────────────────────────────── */
        .court-info { text-align:center; color:#fff; }
        .court-name {
            font-weight:600; font-size:15px;
            color: rgba(147,197,253,0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── PLAYOFF BADGES ─────────────────────────────────────── */
        .playoff-badge {
            position: absolute;
            left: -65px;
            width: 55px;
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 20px;
            text-transform: uppercase; letter-spacing: 0.5px;
            text-align: center; line-height: 1.1;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 5;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            pointer-events: none;
            color: #ffffff;
        }

        .playoff-badge.playoffs-14 {
            background: rgba(134, 239, 172, 0.45);
            border-color: rgba(134,239,172,0.5);
            height: 338px;
            top: 0px;
        }

        .playoff-badge.playoff-57 {
            background: rgba(147, 197, 253, 0.45);
            border-color: rgba(147,197,253,0.5);
            height: 169px;
            top: 338px;
        }

        .playoff-badge.playout {
            background: rgba(252, 165, 165, 0.45);
            border-color: rgba(252,165,165,0.5);
            height: 169px;
            top: 507px;
        }

        /* ── LEAGUE LOGO ─────────────────────────────────────── */
        .league-logo {
            position:absolute; bottom:20px; left:45%; transform:translateX(-50%);
            width:120px; height:120px; z-index:20;
            opacity:0; transform:translateX(-50%) scale(0.3);
            animation:logoZoomGlow 2s ease-out 4s forwards;
        }

        @keyframes logoZoomGlow {
            0% { opacity:0; transform:translateX(-50%) scale(0.3); }
            50% { opacity:1; transform:translateX(-50%) scale(1.1); filter:drop-shadow(0 0 30px #22d3ee); }
            100% { opacity:1; transform:translateX(-50%) scale(1); filter:drop-shadow(0 0 20px #3b82f6); }
        }

        .league-logo img {
            width:150%; height:150%; object-fit:contain;
            animation:logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { filter:drop-shadow(0 0 20px rgba(59,130,246,0.6)) drop-shadow(0 0 40px rgba(59,130,246,0.3)) brightness(1); }
            50% { filter:drop-shadow(0 0 30px rgba(34,211,238,0.8)) drop-shadow(0 0 60px rgba(59,130,246,0.5)) brightness(1.1); }
        }
    </style>
</head>
<body>
    <div class="graphics-container" id="graphicsContainer">
        <div class="volleyball-3d-scene" id="volleyball-3d-scene"></div>
        <div class="moving-lines">
            <div class="line line-1"></div>
            <div class="line line-2"></div>
            <div class="line line-3"></div>
            <div class="line line-4"></div>
            <div class="line line-5"></div>
        </div>

        <div class="title">ΠΡΟΓΡΑΜΜΑ ΑΓΩΝΙΣΤΙΚΗΣ</div>

        <div class="schedule-container">
            <!-- Playoff badges on the left -->
            <div class="playoff-badge playoffs-14">PLAYOFFS ΗΜΙΤΕΛΙΚΩΝ</div>
            <div class="playoff-badge playoff-57">PLAYOFF 5-7</div>
            <div class="playoff-badge playout">PLAYOUT</div>

            <div class="schedule-table" id="scheduleTable"></div>
        </div>

        <div class="league-logo">
            <img src="logos/VL_logo.png" alt="Greek Volleyball League">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        async function loadSchedule() {
            try {
                const res = await fetch('./gameday/schedule.json');
                const data = await res.json();
                const table = document.getElementById('scheduleTable');
                table.innerHTML = '';

                data.matches.forEach((match, i) => {
                    const row = document.createElement('div');
                    row.className = 'game-row';
                    row.style.animationDelay = `${1.5 + (i * 0.3)}s`;

                    row.innerHTML = `
                        <div class="home-team">
                            <div class="team-logo"><img src="${match.home.logo}" alt="${match.home.name}"></div>
                            <div class="team-info">
                                <div class="team-name">${match.home.name}</div>
                                <div class="team-subtitle">${match.home.subtitle || ''}</div>
                            </div>
                        </div>
                        <div class="vs-section">
                            <div class="game-date">${match.date}</div>
                            <div class="vs-text">VS</div>
                            <div class="game-time">${match.time}</div>
                        </div>
                        <div class="away-team">
                            <div class="team-info">
                                <div class="team-name">${match.away.name}</div>
                                <div class="team-subtitle">${match.away.subtitle || ''}</div>
                            </div>
                            <div class="team-logo"><img src="${match.away.logo}" alt="${match.away.name}"></div>
                        </div>
                        <div class="court-info">
                            <div class="court-name">${match.court}</div>
                        </div>
                    `;
                    table.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading schedule:', error);
            }
        }

        let scene, camera, renderer, volleyballs = [];
        let animationId;

        function init3D() {
            const container = document.getElementById('volleyball-3d-scene');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, 1920 / 1080, 0.1, 1000);
            camera.position.set(0, 0, 15);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(1920, 1080);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            createFlyingVolleyballs();
            animate3D();
        }

        function createVolleyball() {
            const volleyballGeometry = new THREE.SphereGeometry(2, 64, 64);
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const centerX = 512, centerY = 512;
            ctx.fillStyle = '#1e3a8a'; ctx.fillRect(0, 0, 1024, 1024);
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.arc(centerX, centerY, 400, -Math.PI/2, 0); ctx.lineTo(centerX, centerY); ctx.fill();
            ctx.beginPath(); ctx.arc(centerX, centerY, 400, Math.PI/2, Math.PI); ctx.lineTo(centerX, centerY); ctx.fill();
            ctx.beginPath(); ctx.arc(centerX, centerY, 400, Math.PI, 3*Math.PI/2); ctx.lineTo(centerX, centerY); ctx.fill();
            ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 8; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.arc(centerX, centerY, 350, 0.3, Math.PI - 0.3); ctx.stroke();
            ctx.beginPath(); ctx.arc(centerX, centerY, 350, Math.PI + 0.3, 2 * Math.PI - 0.3); ctx.stroke();
            const volleyballTexture = new THREE.CanvasTexture(canvas);
            const volleyballMaterial = new THREE.MeshPhongMaterial({ map: volleyballTexture, shininess: 25, specular: new THREE.Color(0x333333) });
            const volleyball = new THREE.Mesh(volleyballGeometry, volleyballMaterial);
            volleyball.castShadow = true; volleyball.receiveShadow = true;
            return volleyball;
        }

        function createFlyingVolleyballs() {
            for (let i = 0; i < 3; i++) {
                const volleyball = createVolleyball();
                volleyball.userData = { speed: 0.8 + i * 0.3, yOffset: (i - 1) * 8, phase: i * Math.PI * 0.66, direction: i % 2 === 0 ? 1 : -1 };
                volleyball.position.set(volleyball.userData.direction === 1 ? -25 : 25, volleyball.userData.yOffset, -5 + i * 2);
                volleyball.scale.set(0.8 + i * 0.1, 0.8 + i * 0.1, 0.8 + i * 0.1);
                volleyballs.push(volleyball);
                scene.add(volleyball);
            }
        }

        function animate3D() {
            animationId = requestAnimationFrame(animate3D);
            const time = Date.now() * 0.001;
            volleyballs.forEach((volleyball, index) => {
                const userData = volleyball.userData;
                const progress = (time * userData.speed + userData.phase) % (Math.PI * 2);
                const normalizedProgress = (Math.sin(progress) + 1) / 2;
                if (userData.direction === 1) {
                    volleyball.position.set(-25 + normalizedProgress * 50, userData.yOffset + Math.sin(normalizedProgress * Math.PI) * 6, volleyball.position.z);
                } else {
                    volleyball.position.set(25 - normalizedProgress * 50, userData.yOffset + Math.sin(normalizedProgress * Math.PI) * 6, volleyball.position.z);
                }
                volleyball.rotation.x += 0.02 * userData.speed;
                volleyball.rotation.y += 0.015 * userData.speed;
                const scale = 0.8 + index * 0.1 + Math.sin(time * 2 + index) * 0.1;
                volleyball.scale.set(scale, scale, scale);
            });
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            document.querySelector('.graphics-container').style.transform = `scale(${scale})`;
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadSchedule();
            init3D();
            window.addEventListener('resize', onWindowResize);
        });

        window.addEventListener('beforeunload', function() {
            if (animationId) cancelAnimationFrame(animationId);
            if (renderer) renderer.dispose();
        });
    </script>
</body>
</html>
